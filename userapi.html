<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=auto, user-scalable=no">
  <title>Avatar Updater · Abigail4410</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: {} } }
  </script>
  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1f2937; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 6px; }
    /* File input override */
    .file-input-wrapper { position: relative; display: inline-block; cursor: pointer; width: 100%; }
    .file-input-wrapper input { position: absolute; opacity: 0; width: 0; height: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="bg-gray-950 text-gray-200 font-sans antialiased">

  <!-- Header (compact) -->
  <header class="border-b border-gray-800 bg-gray-900/80 backdrop-blur-sm sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i class="fa-brands fa-tiktok text-pink-400 text-lg"></i>
        <span class="font-semibold text-sm tracking-tight bg-gradient-to-r from-white to-pink-300 bg-clip-text text-transparent">Avatar Updater</span>
        <span class="text-xs text-gray-500 ml-2">abigail4410</span>
      </div>
      <button id="themeToggle" class="text-gray-400 hover:text-white text-sm w-7 h-7 rounded-full flex items-center justify-center transition">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-6">
    <!-- Main card (glassmorphic) -->
    <div class="bg-gray-900/60 backdrop-blur-sm border border-gray-800 rounded-2xl p-5 shadow-xl">
      
      <!-- Database upload -->
      <div class="mb-5">
        <label class="block text-xs font-medium text-gray-400 mb-1"><i class="fas fa-database mr-1"></i>1. Select SQLite database</label>
        <div class="file-input-wrapper">
          <input type="file" id="dbFileInput" accept=".db,.sqlite">
          <button id="customDbBtn" class="w-full flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium rounded-xl bg-gray-800 hover:bg-gray-700 border border-gray-700 transition text-gray-200">
            <i class="fa-solid fa-database"></i> Choose database
          </button>
        </div>
        <p id="dbName" class="text-xs text-gray-500 mt-1"></p>
      </div>

      <!-- Image upload + compression -->
      <div class="mb-5">
        <label class="block text-xs font-medium text-gray-400 mb-1"><i class="fas fa-image mr-1"></i>2. Select avatar image (JPEG/PNG)</label>
        <div class="file-input-wrapper">
          <input type="file" id="imageFileInput" accept="image/jpeg,image/png">
          <button id="customImageBtn" class="w-full flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium rounded-xl bg-gray-800 hover:bg-gray-700 border border-gray-700 transition text-gray-200">
            <i class="fa-solid fa-image"></i> Choose image
          </button>
        </div>
        <p id="imageName" class="text-xs text-gray-500 mt-1"></p>
        <div id="imagePreview" class="mt-3 hidden">
          <div class="flex items-center gap-3">
            <img id="previewImg" class="w-12 h-12 rounded-full object-cover border border-gray-700">
            <div id="sizeInfo" class="text-xs text-gray-400"></div>
          </div>
        </div>
      </div>

      <!-- Action buttons row -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <button id="updateBtn" disabled class="flex items-center justify-center gap-2 px-3 py-2 text-xs font-medium rounded-xl bg-pink-600 hover:bg-pink-700 text-white transition disabled:opacity-50 disabled:cursor-not-allowed">
          <i class="fa-solid fa-upload"></i> Update Avatar + DisplayName
        </button>
        <button id="vacuumBtn" disabled class="flex items-center justify-center gap-2 px-3 py-2 text-xs font-medium rounded-xl bg-blue-600 hover:bg-blue-700 text-white transition disabled:opacity-50 disabled:cursor-not-allowed">
          <i class="fa-solid fa-compress"></i> Vacuum DB
        </button>
        <button id="downloadBtn" disabled class="flex items-center justify-center gap-2 px-3 py-2 text-xs font-medium rounded-xl bg-green-600 hover:bg-green-700 text-white transition disabled:opacity-50 disabled:cursor-not-allowed">
          <i class="fa-solid fa-download"></i> Download as tikPosts.db
        </button>
      </div>

      <!-- Status area -->
      <div id="status" class="mt-4 text-xs text-center p-2 rounded-lg bg-gray-800/50 border border-gray-700 text-gray-300"></div>
    </div>
  </main>

  <!-- Spinner Overlay -->
  <div id="spinnerOverlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-gray-900 rounded-2xl border border-gray-700 p-5 flex flex-col items-center gap-3 shadow-2xl">
      <div class="w-10 h-10 border-3 border-pink-500 border-t-transparent rounded-full animate-spin"></div>
      <p id="spinnerMessage" class="text-sm font-medium text-gray-200">Processing...</p>
    </div>
  </div>

  <!-- Scripts (unchanged, same paths) -->
  <script src="js/jafersql.js"></script>
  <script src="js/pixelTools.js"></script>

  <script>
    (function() {
      // DOM elements
      const dbFileInput = document.getElementById('dbFileInput');
      const customDbBtn = document.getElementById('customDbBtn');
      const dbNameSpan = document.getElementById('dbName');
      const imageFileInput = document.getElementById('imageFileInput');
      const customImageBtn = document.getElementById('customImageBtn');
      const imageNameSpan = document.getElementById('imageName');
      const imagePreviewDiv = document.getElementById('imagePreview');
      const previewImg = document.getElementById('previewImg');
      const sizeInfoDiv = document.getElementById('sizeInfo');
      const updateBtn = document.getElementById('updateBtn');
      const vacuumBtn = document.getElementById('vacuumBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const statusDiv = document.getElementById('status');
      const spinnerOverlay = document.getElementById('spinnerOverlay');
      const spinnerMessage = document.getElementById('spinnerMessage');

      let currentDb = null;
      let currentDbBuffer = null;
      let currentImageData = null;
      let isDatabaseReadyForDownload = false;
      let hasDisplayNameColumn = false;

      const compressionTool = new CompressionTool();

      function showSpinner(message = 'Processing...') {
        spinnerMessage.textContent = message;
        spinnerOverlay.classList.remove('hidden');
      }

      function hideSpinner() {
        spinnerOverlay.classList.add('hidden');
      }

      function setStatus(message, isError = false) {
        statusDiv.textContent = message;
        statusDiv.className = `mt-4 text-xs text-center p-2 rounded-lg ${isError ? 'bg-red-950/50 border border-red-800 text-red-300' : 'bg-gray-800/50 border border-gray-700 text-gray-300'}`;
      }

      function resetDownloadReadiness() {
        isDatabaseReadyForDownload = false;
        downloadBtn.disabled = true;
      }

      async function checkDisplayNameColumn() {
        if (!currentDb) return false;
        try {
          const columns = currentDb.jaferAll("PRAGMA table_info(userApi)");
          const exists = columns.some(col => col.name === 'displayName');
          hasDisplayNameColumn = exists;
          if (!exists) {
            setStatus('Note: "displayName" column not found. Only avatar will be updated.', false);
          }
          return exists;
        } catch (err) {
          console.warn('Error checking displayName column:', err);
          hasDisplayNameColumn = false;
          return false;
        }
      }

      customDbBtn.addEventListener('click', () => dbFileInput.click());
      customImageBtn.addEventListener('click', () => imageFileInput.click());

      dbFileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        dbNameSpan.textContent = file.name;
        setStatus('Loading database...');
        try {
          const buffer = await file.arrayBuffer();
          currentDbBuffer = buffer;
          currentDb = await JaferSQL.jaferInit(new Uint8Array(buffer));
          const tables = currentDb.jaferAll("SELECT name FROM sqlite_master WHERE type='table' AND name='userApi'");
          if (tables.length === 0) {
            setStatus('Warning: userApi table not found.', true);
          } else {
            await checkDisplayNameColumn();
            setStatus('Database loaded. Ready to update.');
          }
          updateBtn.disabled = false;
          vacuumBtn.disabled = false;
          resetDownloadReadiness();
        } catch (err) {
          console.error(err);
          setStatus('Failed to load database: ' + err.message, true);
          currentDb = null;
          currentDbBuffer = null;
          updateBtn.disabled = true;
          vacuumBtn.disabled = true;
          resetDownloadReadiness();
        }
      });

      imageFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        imageNameSpan.textContent = file.name;
        setStatus('Loading and compressing image to 66% quality...');
        sizeInfoDiv.innerHTML = '';

        const reader = new FileReader();
        reader.onload = async (ev) => {
          const arrayBuffer = ev.target.result;
          const originalSizeKB = arrayBuffer.byteLength / 1024;
          const blob = new Blob([arrayBuffer], { type: file.type });
          const url = URL.createObjectURL(blob);
          const img = new Image();
          img.onload = () => {
            URL.revokeObjectURL(url);
            compressionTool.compressByQuality(img, 66, (compressedImg, compressedSizeKB) => {
              if (!compressedImg) {
                setStatus('Compression failed, using original image.', true);
                currentImageData = new Uint8Array(arrayBuffer);
                previewImg.src = url;
                imagePreviewDiv.classList.remove('hidden');
                sizeInfoDiv.innerHTML = `📁 Original: ${originalSizeKB.toFixed(1)} KB (compression failed)`;
                setStatus('Image loaded (original). Click update.');
                return;
              }
              const compressedCanvas = document.createElement('canvas');
              compressedCanvas.width = compressedImg.width;
              compressedCanvas.height = compressedImg.height;
              const ctx = compressedCanvas.getContext('2d');
              ctx.drawImage(compressedImg, 0, 0);
              compressedCanvas.toBlob(async (blob) => {
                const compressedBuffer = await blob.arrayBuffer();
                currentImageData = new Uint8Array(compressedBuffer);
                const compressedUrl = URL.createObjectURL(blob);
                previewImg.src = compressedUrl;
                imagePreviewDiv.classList.remove('hidden');
                URL.revokeObjectURL(compressedUrl);
                const savedPercent = ((1 - compressedSizeKB / originalSizeKB) * 100).toFixed(1);
                sizeInfoDiv.innerHTML = `📁 Original: ${originalSizeKB.toFixed(1)} KB → Compressed: ${compressedSizeKB.toFixed(1)} KB (${savedPercent}% saved)`;
                setStatus(`Image compressed (66% quality). Ready to update.`);
              }, 'image/jpeg', 0.66);
            });
          };
          img.src = url;
        };
        reader.onerror = () => setStatus('Failed to read image', true);
        reader.readAsArrayBuffer(file);
      });

      updateBtn.addEventListener('click', async () => {
        if (!currentDb) {
          setStatus('No database loaded.', true);
          return;
        }
        if (!currentImageData) {
          setStatus('No image selected or compressed.', true);
          return;
        }

        updateBtn.disabled = true;
        vacuumBtn.disabled = true;

        try {
          await checkDisplayNameColumn();

          const existing = currentDb.jaferGet('SELECT * FROM userApi WHERE username = ?', ['abigail4410']);
          const now = new Date().toISOString();

          if (existing) {
            if (hasDisplayNameColumn) {
              currentDb.jaferRun(`
                UPDATE userApi 
                SET avatar = ?, fetched_at = ?, displayName = ? 
                WHERE username = ?
              `, [currentImageData, now, 'Abigail', 'abigail4410']);
              setStatus('Avatar and displayName updated to "Abigail".');
            } else {
              currentDb.jaferRun(`
                UPDATE userApi 
                SET avatar = ?, fetched_at = ? 
                WHERE username = ?
              `, [currentImageData, now, 'abigail4410']);
              setStatus('Avatar updated (displayName column not found).');
            }
          } else {
            if (hasDisplayNameColumn) {
              currentDb.jaferRun(`
                INSERT INTO userApi (username, avatar, fetched_at, status, displayName)
                VALUES (?, ?, ?, ?, ?)
              `, ['abigail4410', currentImageData, now, 'manual_upload', 'Abigail']);
              setStatus('New row inserted with avatar and displayName "Abigail".');
            } else {
              currentDb.jaferRun(`
                INSERT INTO userApi (username, avatar, fetched_at, status)
                VALUES (?, ?, ?, ?)
              `, ['abigail4410', currentImageData, now, 'manual_upload']);
              setStatus('New row inserted with avatar only (displayName column missing).');
            }
          }

          isDatabaseReadyForDownload = true;
          downloadBtn.disabled = false;
        } catch (err) {
          console.error(err);
          setStatus('Update failed: ' + err.message, true);
        } finally {
          updateBtn.disabled = false;
          vacuumBtn.disabled = false;
        }
      });

      vacuumBtn.addEventListener('click', async () => {
        if (!currentDb) {
          setStatus('No database loaded.', true);
          return;
        }
        vacuumBtn.disabled = true;
        updateBtn.disabled = true;
        try {
          showSpinner('Running VACUUM... This may take a moment.');
          await new Promise(resolve => setTimeout(resolve, 10));
          currentDb.jaferRun('VACUUM');
          hideSpinner();
          setStatus('Database vacuumed successfully (compacted). You can now download the optimized database.');
          isDatabaseReadyForDownload = true;
          downloadBtn.disabled = false;
        } catch (err) {
          hideSpinner();
          console.error(err);
          setStatus('Vacuum failed: ' + err.message, true);
        } finally {
          vacuumBtn.disabled = false;
          updateBtn.disabled = false;
        }
      });

      downloadBtn.addEventListener('click', () => {
        if (!currentDb || !isDatabaseReadyForDownload) {
          setStatus('No database ready for download. Please update avatar or run vacuum first.', true);
          return;
        }
        try {
          const exported = currentDb.jaferExport();
          const blob = new Blob([exported], { type: 'application/octet-stream' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'tikPosts.db';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          setStatus('Database downloaded as tikPosts.db');
        } catch (err) {
          setStatus('Download failed: ' + err.message, true);
        }
      });

      // Theme toggle
      const themeToggle = document.getElementById('themeToggle');
      const html = document.documentElement;
      const savedTheme = localStorage.getItem('theme') || 'dark';
      if (savedTheme === 'light') html.classList.remove('dark');
      else html.classList.add('dark');
      themeToggle.innerHTML = html.classList.contains('dark') ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';
      themeToggle.addEventListener('click', () => {
        if (html.classList.contains('dark')) {
          html.classList.remove('dark');
          localStorage.setItem('theme', 'light');
          themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
        } else {
          html.classList.add('dark');
          localStorage.setItem('theme', 'dark');
          themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
        }
      });
    })();
  </script>
</body>
</html>
